plugins {
    id 'com.android.application' version '8.3.2' apply true
}

android {
    compileSdk 34
    namespace 'com.gody.app'

    defaultConfig {
        applicationId "com.gody.app"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "0.1"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {}
